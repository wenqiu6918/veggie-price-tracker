<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜价本 - 测试版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #333;
    max-width: 430px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 { text-align: center; margin-bottom: 20px; color: #1e90ff; }
  .btn {
    background: #1e90ff;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
  }
  .btn:active { opacity: 0.8; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }
  .modal.show { display: flex; align-items: flex-end; }
  .modal-content {
    background: white;
    width: 100%;
    padding: 20px;
    border-radius: 20px 20px 0 0;
  }
  input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  .record-list { margin-top: 20px; }
  .record-item {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
  }
  .record-name { font-weight: bold; }
  .record-price { color: #1e90ff; font-weight: bold; }
</style>
</head>
<body>

<h1>🥬 菜价本</h1>

<button class="btn" onclick="openModal()">+ 记录菜价</button>

<div class="record-list" id="recordList"></div>

<div class="modal" id="addModal" onclick="closeModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 style="margin-bottom: 15px;">新增菜价</h3>
    <input type="text" id="vegName" placeholder="蔬菜名称（如：西红柿）">
    <input type="number" id="vegPrice" placeholder="价格（如：3.5）">
    <input type="text" id="vegLocation" placeholder="购买地点（如：菜市场）">
    <input type="date" id="vegDate">
    <button class="btn" onclick="saveRecord()">保存</button>
    <button class="btn" style="background: #999;" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('vegRecords') || '[]');

function openModal() {
  document.getElementById('vegDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('addModal').classList.add('show');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeModal();
}

function saveRecord() {
  const name = document.getElementById('vegName').value.trim();
  const price = document.getElementById('vegPrice').value.trim();
  const location = document.getElementById('vegLocation').value.trim();
  const date = document.getElementById('vegDate').value;

  if (!name || !price || !location) {
    alert('请填写完整信息');
    return;
  }

  const record = {
    id: Date.now(),
    name,
    price,
    location,
    date,
    createdAt: new Date().toISOString()
  };

  records.unshift(record);
  localStorage.setItem('vegRecords', JSON.stringify(records));
  
  // 清空表单
  document.getElementById('vegName').value = '';
  document.getElementById('vegPrice').value = '';
  document.getElementById('vegLocation').value = '';
  
  closeModal();
  renderList();
  alert('保存成功！');
}

function renderList() {
  const list = document.getElementById('recordList');
  if (records.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#999;margin-top:40px;">还没有记录，点击上方按钮添加</p>';
    return;
  }
  
  list.innerHTML = records.map(r => `
    <div class="record-item">
      <div>
        <div class="record-name">${r.name}</div>
        <div style="font-size:12px;color:#666;">${r.location} · ${r.date}</div>
      </div>
      <div class="record-price">¥${r.price}</div>
    </div>
  `).join('');
}

// 初始化
renderList();
</script>

</body>
</html>
