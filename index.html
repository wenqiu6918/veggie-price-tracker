<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜价本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #333;
    max-width: 430px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 100px;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  h1 { color: #1e90ff; margin-bottom: 10px; }
  .stats {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-bottom: 15px;
    font-size: 14px;
  }
  .stat {
    background: #f0f4f8;
    padding: 10px 15px;
    border-radius: 8px;
  }
  .stat-num { color: #1e90ff; font-weight: bold; font-size: 18px; }
  .stat-label { color: #999; font-size: 12px; }
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  .search-bar input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
  .search-bar button {
    background: #1e90ff;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn {
    background: #1e90ff;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
  }
  .btn-secondary {
    background: #999;
  }
  .btn:active { opacity: 0.8; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }
  .modal.show { display: flex; align-items: flex-end; }
  .modal-content {
    background: white;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    border-radius: 20px 20px 0 0;
  }
  .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 100px; }
  .record-list { margin-top: 20px; }
  .record-item {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .record-info { flex: 1; }
  .record-name { font-weight: bold; }
  .record-meta { font-size: 12px; color: #666; margin-top: 4px; }
  .record-price { color: #1e90ff; font-weight: bold; text-align: right; }
  .record-actions { margin-left: 10px; }
  .record-actions button {
    background: none;
    border: none;
    color: #1e90ff;
    cursor: pointer;
    font-size: 16px;
    padding: 5px;
  }
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid #ddd;
  }
  .tab {
    padding: 10px 15px;
    border: none;
    background: none;
    cursor: pointer;
    color: #999;
    font-weight: 500;
  }
  .tab.active {
    color: #1e90ff;
    border-bottom: 2px solid #1e90ff;
  }
  .compare-item {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
  }
  .compare-name { font-weight: bold; margin-bottom: 10px; }
  .compare-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-location { color: #666; }
  .compare-price { color: #1e90ff; font-weight: bold; }
  .preview-item {
    background: #f0f4f8;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    font-size: 13px;
  }
  .preview-error { background: #ffe8e8; color: #ff6b6b; }
  .empty-msg { text-align: center; color: #999; margin-top: 40px; }
</style>
</head>
<body>

<div class="header">
  <h1>🥬 菜价本</h1>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">条记录</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="vegCount">0</div>
      <div class="stat-label">种蔬菜</div>
    </div>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索蔬菜或地点..." onkeyup="renderList()">
  <button onclick="clearSearch()">清空</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list', this)">📋 记录</button>
  <button class="tab" onclick="switchTab('compare', this)">📊 比价</button>
</div>

<button class="btn" onclick="openModal('addModal')">+ 记录菜价</button>
<button class="btn btn-secondary" onclick="openModal('importModal')">📥 批量导入</button>

<div class="record-list" id="recordList"></div>

<!-- 新增菜价模态框 -->
<div class="modal" id="addModal" onclick="closeModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-title">新增菜价</div>
    <input type="text" id="vegName" placeholder="蔬菜名称（如：西红柿）">
    <input type="number" id="vegPrice" placeholder="价格（如：3.5）" step="0.1">
    <input type="text" id="vegLocation" placeholder="购买地点（如：菜市场）">
    <input type="date" id="vegDate">
    <input type="text" id="vegNote" placeholder="备注（可选）">
    <button class="btn" onclick="saveRecord()">保存</button>
    <button class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
  </div>
</div>

<!-- 批量导入模态框 -->
<div class="modal" id="importModal" onclick="closeModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-title">批量导入</div>
    <div style="margin-bottom: 10px; font-size: 12px; color: #666;">
      每行一条，格式：菜名 价格 地点 [日期] [备注]<br>
      例如：西红柿 3.5 菜市场 2026-03-25 新鲜
    </div>
    <textarea id="importText" placeholder="粘贴菜价数据..."></textarea>
    <div id="previewArea" style="display: none; margin: 10px 0;">
      <div style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">预览 (<span id="previewCount">0</span>条)</div>
      <div id="previewList" style="max-height: 200px; overflow-y: auto;"></div>
    </div>
    <button class="btn" onclick="parseImportData()">🔍 预览</button>
    <button class="btn" id="confirmBtn" style="display: none;" onclick="confirmImport()">✅ 确认导入</button>
    <button class="btn btn-secondary" onclick="closeModal('importModal')">取消</button>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('vegRecords') || '[]');
let currentTab = 'list';
let pendingImport = [];

function updateStats() {
  document.getElementById('totalCount').textContent = records.length;
  const names = new Set(records.map(r => r.name));
  document.getElementById('vegCount').textContent = names.size;
}

function openModal(id) {
  document.getElementById(id).classList.add('show');
  if (id === 'addModal') {
    document.getElementById('vegDate').value = new Date().toISOString().split('T')[0];
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('show');
  }
}

function saveRecord() {
  const name = document.getElementById('vegName').value.trim();
  const price = document.getElementById('vegPrice').value.trim();
  const location = document.getElementById('vegLocation').value.trim();
  const date = document.getElementById('vegDate').value;
  const note = document.getElementById('vegNote').value.trim();

  if (!name || !price || !location) {
    alert('请填写蔬菜名称、价格和地点');
    return;
  }

  const record = {
    id: Date.now(),
    name,
    price,
    location,
    date,
    note,
    createdAt: new Date().toISOString()
  };

  records.unshift(record);
  localStorage.setItem('vegRecords', JSON.stringify(records));
  
  document.getElementById('vegName').value = '';
  document.getElementById('vegPrice').value = '';
  document.getElementById('vegLocation').value = '';
  document.getElementById('vegNote').value = '';
  
  closeModal('addModal');
  updateStats();
  renderList();
  alert('保存成功！');
}

function deleteRecord(id) {
  if (confirm('确定删除这条记录吗？')) {
    records = records.filter(r => r.id !== id);
    localStorage.setItem('vegRecords', JSON.stringify(records));
    updateStats();
    renderList();
  }
}

function parseImportData() {
  const text = document.getElementById('importText').value.trim();
  if (!text) {
    alert('请输入数据');
    return;
  }

  pendingImport = [];
  const lines = text.split('
').filter(l => l.trim());
  const today = new Date().toISOString().split('T')[0];

  lines.forEach(line => {
    const parts = line.trim().split(/\s+/);
    if (parts.length < 3) {
      pendingImport.push({ error: true, text: line, msg: '格式错误' });
      return;
    }

    const [name, price, location, ...rest] = parts;
    const date = rest[0] || today;
    const note = rest.slice(1).join(' ') || '';

    if (isNaN(parseFloat(price)) || parseFloat(price) <= 0) {
      pendingImport.push({ error: true, text: line, msg: '价格无效' });
      return;
    }

    pendingImport.push({
      error: false,
      name,
      price: parseFloat(price).toFixed(1),
      location,
      date,
      note
    });
  });

  const validCount = pendingImport.filter(d => !d.error).length;
  const errorCount = pendingImport.filter(d => d.error).length;

  const previewList = document.getElementById('previewList');
  previewList.innerHTML = pendingImport.map(d => {
    if (d.error) {
      return `<div class="preview-item preview-error">❌ ${d.text}<br><span style="font-size:11px;">${d.msg}</span></div>`;
    }
    return `<div class="preview-item">✓ ${d.name} ¥${d.price} @ ${d.location} (${d.date})${d.note ? ' · ' + d.note : ''}</div>`;
  }).join('');

  document.getElementById('previewCount').textContent = validCount;
  document.getElementById('previewArea').style.display = 'block';
  document.getElementById('confirmBtn').style.display = validCount > 0 ? 'block' : 'none';

  alert(`预览完成：${validCount}条有效${errorCount > 0 ? '，' + errorCount + '条错误' : ''}`);
}

function confirmImport() {
  const validData = pendingImport.filter(d => !d.error);
  if (!validData.length) {
    alert('没有有效数据');
    return;
  }

  validData.forEach(d => {
    records.unshift({
      id: Date.now() + Math.random(),
      name: d.name,
      price: d.price,
      location: d.location,
      date: d.date,
      note: d.note,
      createdAt: new Date().toISOString()
    });
  });

  localStorage.setItem('vegRecords', JSON.stringify(records));
  document.getElementById('importText').value = '';
  document.getElementById('previewArea').style.display = 'none';
  closeModal('importModal');
  updateStats();
  renderList();
  alert(`已导入 ${validData.length} 条记录！`);
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderList();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return records.filter(r =>
    !q || r.name.toLowerCase().includes(q) || r.location.toLowerCase().includes(q)
  );
}

function renderList() {
  const list = document.getElementById('recordList');
  const filtered = getFiltered();
  
  if (currentTab === 'list') {
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-msg">还没有记录</div>';
      return;
    }
    
    const groups = {};
    filtered.forEach(r => {
      if (!groups[r.date]) groups[r.date] = [];
      groups[r.date].push(r);
    });
    
    let html = '';
    Object.keys(groups).sort().reverse().forEach(date => {
      html += `<div style="margin-bottom:15px;"><div style="font-size:12px;color:#999;margin-bottom:8px;font-weight:bold;">${formatDate(date)}</div>`;
      groups[date].forEach(r => {
        html += `
          <div class="record-item">
            <div class="record-info">
              <div class="record-name">${r.name}</div>
              <div class="record-meta">${r.location}${r.note ? ' · ' + r.note : ''}</div>
            </div>
            <div style="text-align:right;">
              <div class="record-price">¥${r.price}</div>
              <button onclick="deleteRecord(${r.id})" style="color:#ff6b6b;font-size:12px;background:none;border:none;cursor:pointer;margin-top:4px;">删除</button>
            </div>
          </div>
        `;
      });
      html += '</div>';
    });
    list.innerHTML = html;
  } else {
    // 比价模式
    const groups = {};
    filtered.forEach(r => {
      if (!groups[r.name]) groups[r.name] = [];
      groups[r.name].push(r);
    });
    
    const names = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);
    
    if (names.length === 0) {
      list.innerHTML = '<div class="empty-msg">暂无比价数据</div>';
      return;
    }
    
    let html = '';
    names.forEach(name => {
      const items = groups[name].sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
      const minPrice = parseFloat(items[0].price);
      const maxPrice = parseFloat(items[items.length - 1].price);
      
      html += `
        <div class="compare-item">
          <div class="compare-name">${name} (${items.length}条)</div>
          ${maxPrice > minPrice ? `<div style="font-size:12px;color:#1e90ff;margin-bottom:8px;">最多省 ¥${(maxPrice - minPrice).toFixed(1)}</div>` : ''}
      `;
      
      items.forEach((item, i) => {
        const isBest = i === 0;
        html += `
          <div class="compare-row" style="${isBest ? 'background:#e8f4ff;padding:8px;border-radius:4px;' : ''}">
            <div>
              <div class="compare-location">${item.location}</div>
              <div style="font-size:11px;color:#999;">${item.date}</div>
            </div>
            <div class="compare-price">${isBest ? '✓ ' : ''}¥${item.price}</div>
          </div>
        `;
      });
      
      html += '</div>';
    });
    list.innerHTML = html;
  }
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  
  if (d.getTime() === today.getTime()) return '今天';
  if (d.getTime() === yesterday.getTime()) return '昨天';
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

// 初始化
updateStats();
renderList();
</script>

</body>
</html>
