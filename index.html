<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜价本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #333;
    max-width: 430px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 { text-align: center; margin-bottom: 20px; color: #1e90ff; }
  .btn {
    background: #1e90ff;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
  }
  .btn:active { opacity: 0.8; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }
  .modal.show { display: flex; align-items: flex-end; }
  .modal-content {
    background: white;
    width: 100%;
    padding: 20px;
    border-radius: 20px 20px 0 0;
  }
  input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  .record-list { margin-top: 20px; }
  .record-item {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .record-info { flex: 1; }
  .record-name { font-weight: bold; }
  .record-meta { font-size: 12px; color: #666; margin-top: 4px; }
  .record-price { color: #1e90ff; font-weight: bold; text-align: right; }
  .record-actions { margin-left: 10px; }
  .record-actions button {
    background: none;
    border: none;
    color: #1e90ff;
    cursor: pointer;
    font-size: 16px;
    padding: 5px;
  }
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid #ddd;
  }
  .tab {
    padding: 10px 15px;
    border: none;
    background: none;
    cursor: pointer;
    color: #999;
    font-weight: 500;
  }
  .tab.active {
    color: #1e90ff;
    border-bottom: 2px solid #1e90ff;
  }
  .compare-item {
    background: #f5f5f5;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
  }
  .compare-name { font-weight: bold; margin-bottom: 10px; }
  .compare-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-location { color: #666; }
  .compare-price { color: #1e90ff; font-weight: bold; }
</style>
</head>
<body>

<h1>🥬 菜价本</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list', this)">📋 记录</button>
  <button class="tab" onclick="switchTab('compare', this)">📊 比价</button>
</div>

<button class="btn" onclick="openModal()">+ 记录菜价</button>

<div class="record-list" id="recordList"></div>

<div class="modal" id="addModal" onclick="closeModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 style="margin-bottom: 15px;">新增菜价</h3>
    <input type="text" id="vegName" placeholder="蔬菜名称（如：西红柿）">
    <input type="number" id="vegPrice" placeholder="价格（如：3.5）" step="0.1">
    <input type="text" id="vegLocation" placeholder="购买地点（如：菜市场）">
    <input type="date" id="vegDate">
    <input type="text" id="vegNote" placeholder="备注（可选）">
    <button class="btn" onclick="saveRecord()">保存</button>
    <button class="btn" style="background: #999;" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('vegRecords') || '[]');
let currentTab = 'list';

function openModal() {
  document.getElementById('vegDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('addModal').classList.add('show');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeModal();
}

function saveRecord() {
  const name = document.getElementById('vegName').value.trim();
  const price = document.getElementById('vegPrice').value.trim();
  const location = document.getElementById('vegLocation').value.trim();
  const date = document.getElementById('vegDate').value;
  const note = document.getElementById('vegNote').value.trim();

  if (!name || !price || !location) {
    alert('请填写蔬菜名称、价格和地点');
    return;
  }

  const record = {
    id: Date.now(),
    name,
    price,
    location,
    date,
    note,
    createdAt: new Date().toISOString()
  };

  records.unshift(record);
  localStorage.setItem('vegRecords', JSON.stringify(records));
  
  // 清空表单
  document.getElementById('vegName').value = '';
  document.getElementById('vegPrice').value = '';
  document.getElementById('vegLocation').value = '';
  document.getElementById('vegNote').value = '';
  
  closeModal();
  renderList();
  alert('保存成功！');
}

function deleteRecord(id) {
  if (confirm('确定删除这条记录吗？')) {
    records = records.filter(r => r.id !== id);
    localStorage.setItem('vegRecords', JSON.stringify(records));
    renderList();
  }
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('recordList');
  
  if (currentTab === 'list') {
    if (records.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#999;margin-top:40px;">还没有记录，点击上方按钮添加</p>';
      return;
    }
    
    // 按日期分组
    const groups = {};
    records.forEach(r => {
      if (!groups[r.date]) groups[r.date] = [];
      groups[r.date].push(r);
    });
    
    let html = '';
    Object.keys(groups).sort().reverse().forEach(date => {
      html += `<div style="margin-bottom:15px;"><div style="font-size:12px;color:#999;margin-bottom:8px;font-weight:bold;">${formatDate(date)}</div>`;
      groups[date].forEach(r => {
        html += `
          <div class="record-item">
            <div class="record-info">
              <div class="record-name">${r.name}</div>
              <div class="record-meta">${r.location}${r.note ? ' · ' + r.note : ''}</div>
            </div>
            <div style="text-align:right;">
              <div class="record-price">¥${r.price}</div>
              <button onclick="deleteRecord(${r.id})" style="color:#ff6b6b;font-size:12px;background:none;border:none;cursor:pointer;margin-top:4px;">删除</button>
            </div>
          </div>
        `;
      });
      html += '</div>';
    });
    list.innerHTML = html;
  } else {
    // 比价模式
    const groups = {};
    records.forEach(r => {
      if (!groups[r.name]) groups[r.name] = [];
      groups[r.name].push(r);
    });
    
    const names = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);
    
    if (names.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#999;margin-top:40px;">暂无比价数据</p>';
      return;
    }
    
    let html = '';
    names.forEach(name => {
      const items = groups[name].sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
      const minPrice = parseFloat(items[0].price);
      const maxPrice = parseFloat(items[items.length - 1].price);
      
      html += `
        <div class="compare-item">
          <div class="compare-name">${name} (${items.length}条记录)</div>
          ${maxPrice > minPrice ? `<div style="font-size:12px;color:#1e90ff;margin-bottom:8px;">最多省 ¥${(maxPrice - minPrice).toFixed(1)}</div>` : ''}
      `;
      
      items.forEach((item, i) => {
        const isBest = i === 0;
        html += `
          <div class="compare-row" style="${isBest ? 'background:#e8f4ff;padding:8px;border-radius:4px;' : ''}">
            <div>
              <div class="compare-location">${item.location}</div>
              <div style="font-size:11px;color:#999;">${item.date}</div>
            </div>
            <div class="compare-price">${isBest ? '✓ ' : ''}¥${item.price}</div>
          </div>
        `;
      });
      
      html += '</div>';
    });
    list.innerHTML = html;
  }
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  
  if (d.getTime() === today.getTime()) return '今天';
  if (d.getTime() === yesterday.getTime()) return '昨天';
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

// 初始化
renderList();
</script>

</body>
</html>
